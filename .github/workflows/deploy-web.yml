name: Deploy to Firebase Hosting on Merge

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'DEPLOYMENT_GUIDE.md'
  pull_request:
    branches:
      - main
      - dev

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build_test:
    name: Build & Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: 🛡️ Security Audit
        run: npm audit --audit-level=moderate || echo "⚠️ Moderate vulnerabilities found, proceeding but review recommended."

      - name: 🧪 Run Unit Tests
        run: npm test

      - name: 🏗️ Build Web App
        run: npm run build:web
        env:
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}

      - name: 📦 Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist/
          retention-days: 1

  deploy:
    name: Deploy to Firebase Hosting
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    needs: build_test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: 📥 Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: dist/

      - name: Deploy to Firebase Hosting & Rules (Production)
        if: github.ref == 'refs/heads/main'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MYGAMESLOT_324A5 }}
          channelId: live
          projectId: mygameslot-324a5
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels

      - name: Deploy to Firebase Hosting (Dev Preview)
        if: github.ref == 'refs/heads/dev'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MYGAMESLOT_324A5 }}
          channelId: dev
          projectId: mygameslot-324a5
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels

      - name: Deploy Cloud Functions
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cd functions && npm install
          cd ..
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_MYGAMESLOT_324A5 }}' > sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/sa.json
          npx firebase-tools deploy --only functions --project mygameslot-324a5 --force

  e2e_tests:
    name: 🎭 E2E [Shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }}]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    needs: deploy
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2]
        shardTotal: [2]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: 📥 Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-all-${{ hashFiles('package-lock.json') }}

      - name: 🌐 Install Playwright System Dependencies
        run: npx playwright install-deps

      - name: 🌐 Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium webkit

      - name: 🧪 Run E2E Tests [Shard ${{ matrix.shardIndex }}]
        run: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - name: 📊 Upload Results [Shard ${{ matrix.shardIndex }}]
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shardIndex }}
          path: playwright-report/
          retention-days: 2
