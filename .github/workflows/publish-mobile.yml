name: Publish Expo OTA Update

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'components/**'
      - 'hooks/**'
      - 'services/**'
      - 'constants/**'
      - 'utils/**'
      - 'assets/**'
      - 'App.tsx'

jobs:
  publish_eas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA Update to Production
        run: eas update --branch production --message "Automated update via GitHub Actions" --auto
