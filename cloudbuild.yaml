
# Google Cloud Build Configuration for GameSlot
# This file defines the CI/CD pipeline for Google Cloud.

steps:
  # 1. Install Root Dependencies
  - name: 'node:22'
    id: 'Install Root'
    entrypoint: npm
    args: ['install', '--legacy-peer-deps']

  # 2. Run Root Logic Tests (Jest)
  - name: 'node:22'
    id: 'Frontend Tests'
    entrypoint: npm
    args: ['test']

  # 3. Install Functions Dependencies
  - name: 'node:22'
    id: 'Install Functions'
    entrypoint: npm
    dir: 'functions'
    args: ['install']

  # 4. Run Backend Tests (Functions & Rules)
  # Uses Firebase Emulator for rules testing.
  # Passes API Keys from substitution variables for search tests.
  - name: 'node:22-bookworm'
    id: 'Backend Tests'
    entrypoint: bash
    args:
      - '-c'
      - |
        set -e
        echo "=========================================="
        echo "!!! STARTING BACKEND TESTS !!!"
        echo "=========================================="
        echo "Running as: $(whoami)"
        
        # Install Java (Required for Firebase Emulator)
        echo "Installing Java OpenJDK 17..."
        apt-get update -y
        apt-get install -y --no-install-recommends openjdk-17-jre-headless
        
        # Verify Java installation
        echo "Verifying Java..."
        java -version
        which java
        
        # Inject API keys into environment for tests
        export SERPER_KEY=$_SERPER_KEY
        export NEWS_KEY=$_NEWS_KEY
        
        # Start emulator and run tests
        npx firebase-tools emulators:exec --only firestore --project $PROJECT_ID "cd functions && npm test"

  # 5. Build Web Application
  - name: 'node:22'
    id: 'Build Web'
    entrypoint: bash
    args:
      - '-c'
      - |
        export EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID=$_EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID
        export EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID=$_EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID
        export EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID=$_EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID
        npm run build:web

  # 6. Deploy Firestore & Storage Rules
  - name: 'node:22'
    id: 'Deploy Rules'
    entrypoint: npx
    args: ['firebase-tools', 'deploy', '--only', 'firestore:rules,storage:rules', '--project', '$PROJECT_ID']

  # 7. Deploy Firebase Hosting (Preview for non-main, Live for main)
  - name: 'node:22'
    id: 'Deploy Hosting'
    entrypoint: bash
    args:
      - '-c'
      - |
        if [ "$BRANCH_NAME" = "main" ]; then
          npx firebase-tools deploy --only hosting --project $PROJECT_ID
        else
          # Deploy as a preview channel for feature branches
          npx firebase-tools hosting:channel:deploy dev --project $PROJECT_ID
        fi

  # 8. Deploy Cloud Functions (Main branch only)
  - name: 'node:22'
    id: 'Deploy Functions'
    entrypoint: bash
    args:
      - '-c'
      - |
        if [ "$BRANCH_NAME" = "main" ]; then
          npx firebase-tools deploy --only functions --project $PROJECT_ID --force
        else
          echo "Skipping functions deploy for non-main branch: $BRANCH_NAME"
        fi

# User-defined variables for API keys. 
# These MUST be configured in the Cloud Build Trigger settings.
substitutions:
  _SERPER_KEY: ''
  _NEWS_KEY: ''
  _EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ''
  _EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID: ''
  _EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID: ''

options:
  logging: CLOUD_LOGGING_ONLY
